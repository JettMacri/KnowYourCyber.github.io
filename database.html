<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>KnowYourCyber | Database</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="database.css">
</head>
<body>

  <div class="bg-gif"></div>

  <nav class="glass-nav">
    <div class="nav-container">
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="scramble" data-text="HOME">HOME</a></li>
        <li><a href="database.html" class="scramble" data-text="DATABASE">DATABASE</a></li>
        <li><a href="mission.html" class="scramble" data-text="MISSION">MISSION</a></li>
      </ul>
    </div>
  </nav>

  <main class="database-main">
    <div class="database-header">
      <h1>BREACH DATABASE</h1>
      <p>Search to see if your email or credentials have been exposed</p>
    </div>

    <div class="search-section">
      <input type="text" id="searchInput" class="search-input" placeholder="Search by email or site name...">
    </div>

    <div class="stats-badge">
      <span id="resultCount">0</span> records found
    </div>

    <div id="cardsContainer" class="cards-grid">
      <div class="loading-placeholder">Loading breach data...</div>
    </div>

    <div class="info-note">
      <p>Data sourced from public breach records. Hover over any card to see details.</p>
    </div>
  </main>

  <footer class="database-footer">
    <p>© 2025 KnowYourCyber — Non-profit initiative for digital safety.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
